<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <img class="weather-icon" src="/clear-day.svg" data-current-icon alt=""/>
        <div class="header-current-temp">
          <span data-current-temp>31</span>&deg;C
        </div>
      </div>
      <div class="header-right">
        <div class="info-group">
          <div class="label">High</div>
          <div><span data-current-high>32</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL High</div>
          <div><span data-current-high>27</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Wind</div>
          <div><span data-current-high>9</span>kmh</div>
        </div>
        <div class="info-group">
          <div class="label">Low</div>
          <div><span data-current-high>19</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL Low</div>
          <div><span data-current-high>12</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Precip</div>
          <div><span data-current-high>0.1</span>cm</div>
        </div>
      </div>
    </header>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
