<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <img class="weather-icon" src="/clear-day.svg" data-current-icon alt=""/>
        <div class="header-current-temp">
          <span data-current-temp>31</span>&deg;C
        </div>
      </div>
      <div class="header-right">
        <div class="info-group">
          <div class="label">High</div>
          <div><span data-current-high>32</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL High</div>
          <div><span data-current-fl-high>27</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Wind</div>
          <div><span data-current-wind>9</span>
            <span class="value-sub-info">kmh</span>
          </div>
        </div>
        <div class="info-group">
          <div class="label">Low</div>
          <div><span data-current-high>19</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL Low</div>
          <div><span data-current-fl-low>12</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Precip</div>
          <div><span data-current-precip>0.1</span>
            <span class="value-sub-info">cm</span>
          </div>
        </div>
      </div>
    </header>

    <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Monday</div>
        <div>32&deg;C</div>
      </div>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
