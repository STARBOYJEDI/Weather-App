<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <img class="weather-icon" src="/clear-day.svg" data-current-icon alt=""/>
        <div class="header-current-temp">
          <span data-current-temp>31</span>&deg;C
        </div>
      </div>
      <div class="header-right">
        <div class="info-group">
          <div class="label">High</div>
          <div><span data-current-high>32</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL High</div>
          <div><span data-current-fl-high>27</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Wind</div>
          <div><span data-current-wind>9</span>
            <span class="value-sub-info">kmh</span>
          </div>
        </div>
        <div class="info-group">
          <div class="label">Low</div>
          <div><span data-current-high>19</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">FL Low</div>
          <div><span data-current-fl-low>12</span>&deg;C</div>
        </div>
        <div class="info-group">
          <div class="label">Precip</div>
          <div><span data-current-precip>0.1</span>
            <span class="value-sub-info">cm</span>
          </div>
        </div>
      </div>
    </header>

    <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Monday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Tuesday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Wednesday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Thursday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Friday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Saturday</div>
        <div>32&deg;C</div>
      </div>
      <section class="day-section" data-day-section>
      <div class="day-card">
        <img src="/cloudy.svg" class="weather-icon" alt="">
        <div class="day-card-day">Sunday</div>
        <div>32&deg;C</div>
      </div>
    </section>

    <table class="hour-section">
      <tbody data-hour-section>
        <tr class="hour-row">
          <td>
            <div class="info-group">
              <div class="label">Thursday</div>
              <div>3 PM</div>
            </div>
          </td>
          <td>
            <img src="/cloudy.svg" class="weather-icon" alt="">
          </td>
          <td>
            <div class="info-group">
              <div class="label">Temp</div>
              <div>31&deg;C</div>
            </div>
          </td>
          <td>
            <div class="info-group">
              <div class="label">FL Temp</div>
              <div>25&deg;C</div>
            </div>
          </td>
          <td>
            <div class="info-group">
              <div class="label">Wind</div>
              <div>26<span class="value-sub-info">kmh</span></div>
            </div>
          </td>
          <td>
            <div class="info-group">
              <div class="label">Precip</div>
              <div>0<span class="value-sub-info">cm</span></div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
